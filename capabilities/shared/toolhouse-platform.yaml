naftiko: "1.0.0-alpha1"

info:
  label: "Toolhouse Platform API"
  description: "Backend-as-a-Service API for managing AI agents, tools, bundles, schedules, API keys, agent runs, and Agent Studio sessions on the Toolhouse platform."
  tags:
    - AI Agents
    - Agent Infrastructure
    - Backend As A Service
    - MCP
    - Tools
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TOOLHOUSE_API_KEY: TOOLHOUSE_API_KEY

capability:
  consumes:
    - type: http
      namespace: toolhouse-platform
      baseUri: https://api.toolhouse.ai
      description: "Toolhouse Platform API for managing AI agents, tools, and agent execution."
      authentication:
        type: bearer
        token: "{{TOOLHOUSE_API_KEY}}"
      resources:
        - name: agent-runs
          path: /me/agent-runs
          description: "Manage and retrieve AI agent run history and execution logs."
          operations:
            - name: list-agent-runs
              method: GET
              description: "List all agent runs for the authenticated user with pagination."
              inputParameters:
                - name: next_cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor for next page."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to return (default 30)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-agent-run
              method: GET
              description: "Get details of a specific agent run by run ID."
              inputParameters:
                - name: run_id
                  in: path
                  type: string
                  required: true
                  description: "The UUID of the agent run."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-agent-run-logs
              method: GET
              description: "Retrieve execution logs for a specific agent run."
              inputParameters:
                - name: run_id
                  in: path
                  type: string
                  required: true
                  description: "The UUID of the agent run."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: get-agent-run-mcp-logs
              method: GET
              description: "Retrieve MCP server logs for a specific agent run."
              inputParameters:
                - name: run_id
                  in: path
                  type: string
                  required: true
                  description: "The UUID of the agent run."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

        - name: agents
          path: /me/agents
          description: "Create, manage, and configure AI agents."
          operations:
            - name: list-agents
              method: GET
              description: "Get all agents for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: upsert-agent
              method: POST
              description: "Create or update an AI agent."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  model: "{{tools.model}}"
                  systemPrompt: "{{tools.systemPrompt}}"
            - name: get-agent
              method: GET
              description: "Get details of a specific agent."
              inputParameters:
                - name: agent_id
                  in: path
                  type: string
                  required: true
                  description: "The agent identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: subscribe-to-agent
              method: POST
              description: "Subscribe to a paid agent."
              inputParameters:
                - name: agent_id
                  in: path
                  type: string
                  required: true
                  description: "The agent identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unsubscribe-from-agent
              method: POST
              description: "Unsubscribe from a paid agent."
              inputParameters:
                - name: agent_id
                  in: path
                  type: string
                  required: true
                  description: "The agent identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: agent-studio-chats
          path: /me/agent-studio-chats
          description: "Manage Agent Studio chat sessions."
          operations:
            - name: list-studio-chats
              method: GET
              description: "Get all Agent Studio chats for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-studio-chat
              method: POST
              description: "Create a new Agent Studio chat session."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  agentId: "{{tools.agentId}}"
                  runId: "{{tools.runId}}"
            - name: get-studio-chat
              method: GET
              description: "Get a specific Agent Studio chat by run ID."
              inputParameters:
                - name: run_id
                  in: path
                  type: string
                  required: true
                  description: "The run/chat identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-studio-chat
              method: DELETE
              description: "Delete an Agent Studio chat session."
              inputParameters:
                - name: run_id
                  in: path
                  type: string
                  required: true
                  description: "The run/chat identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-keys
          path: /me/api-keys
          description: "Manage API keys for the authenticated user."
          operations:
            - name: list-api-keys
              method: GET
              description: "Get all API keys for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-api-key
              method: POST
              description: "Create a new API key."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"

        - name: tools
          path: /me/tools
          description: "Browse and manage available Toolhouse tools."
          operations:
            - name: list-tools
              method: GET
              description: "List all available tools in the Toolhouse tool library."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

        - name: bundles
          path: /me/bundles
          description: "Manage tool bundles for organizing and sharing tool sets."
          operations:
            - name: list-bundles
              method: GET
              description: "List all tool bundles for the authenticated user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: create-bundle
              method: POST
              description: "Create a new tool bundle."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  tools: "{{tools.tools}}"

  exposes:
    - type: rest
      port: 8100
      namespace: toolhouse-platform-api
      resources:
        - path: /v1/agent-runs
          name: agent-runs
          description: "Agent run history and logs."
          operations:
            - method: GET
              name: list-agent-runs
              description: "List agent runs with pagination."
              call: "toolhouse-platform.list-agent-runs"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/agents
          name: agents
          description: "AI agent management."
          operations:
            - method: GET
              name: list-agents
              description: "List all agents."
              call: "toolhouse-platform.list-agents"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: upsert-agent
              description: "Create or update an agent."
              call: "toolhouse-platform.upsert-agent"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/tools
          name: tools
          description: "Available Toolhouse tools."
          operations:
            - method: GET
              name: list-tools
              description: "List all available tools."
              call: "toolhouse-platform.list-tools"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: toolhouse-platform-mcp
      transport: http
      tools:
        - name: list-agent-runs
          description: "List all agent runs for the authenticated Toolhouse user."
          hints:
            readOnly: true
            idempotent: true
          call: "toolhouse-platform.list-agent-runs"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-agent-run
          description: "Get details and logs for a specific agent run."
          hints:
            readOnly: true
            idempotent: true
          call: "toolhouse-platform.get-agent-run"
          with:
            run_id: "tools.run_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-agents
          description: "List all AI agents for the authenticated user."
          hints:
            readOnly: true
            idempotent: true
          call: "toolhouse-platform.list-agents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upsert-agent
          description: "Create or update an AI agent definition."
          hints:
            readOnly: false
            idempotent: false
          call: "toolhouse-platform.upsert-agent"
          with:
            name: "tools.name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tools
          description: "List all available tools in the Toolhouse library."
          hints:
            readOnly: true
            idempotent: true
          call: "toolhouse-platform.list-tools"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-bundles
          description: "List all tool bundles."
          hints:
            readOnly: true
            idempotent: true
          call: "toolhouse-platform.list-bundles"
          outputParameters:
            - type: object
              mapping: "$."
