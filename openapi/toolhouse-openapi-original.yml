components:
  schemas:
    AgentExecutionCredits:
      properties:
        user_id:
          type: string
          title: User Id
        total_executions:
          type: integer
          title: Total Executions
        allowed_monthly_executions:
          type: integer
          title: Allowed Monthly Executions
        reset_datetime:
          type: string
          format: date-time
          title: Reset Datetime
        last_reset_datetime:
          type: string
          format: date-time
          title: Last Reset Datetime
          default: '2026-03-25T23:30:58.531373Z'
      type: object
      required:
        - user_id
        - total_executions
        - allowed_monthly_executions
        - reset_datetime
      title: AgentExecutionCredits
    AgentFileBatchPositionRequest:
      properties:
        positions:
          items:
            $ref: '#/components/schemas/AgentFilePositionUpdate'
          type: array
          title: Positions
      type: object
      required:
        - positions
      title: AgentFileBatchPositionRequest
      description: Request model for updating positions of multiple files
    AgentFileCreateRequest:
      properties:
        filename:
          type: string
          maxLength: 255
          minLength: 1
          title: Filename
          description: Original filename
        mime_type:
          type: string
          title: Mime Type
          description: MIME type of the file
        storage_url:
          type: string
          minLength: 1
          format: uri
          title: Storage Url
          description: External URL where the file is hosted
        enabled:
          type: boolean
          title: Enabled
          description: Whether the file is active
          default: true
        position:
          type: integer
          minimum: 0.0
          title: Position
          description: Order position for deterministic injection
          default: 0
        auth:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Auth
          description: Authentication configuration for accessing the file
      type: object
      required:
        - filename
        - mime_type
        - storage_url
      title: AgentFileCreateRequest
      description: Request model for creating a new agent file
    AgentFileListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AgentFileModel'
          type: array
          title: Data
      type: object
      required:
        - data
      title: AgentFileListResponse
      description: API response wrapper for multiple files
    AgentFileModel:
      properties:
        filename:
          type: string
          maxLength: 255
          minLength: 1
          title: Filename
          description: Original filename
        mime_type:
          type: string
          title: Mime Type
          description: MIME type of the file
        storage_url:
          type: string
          minLength: 1
          format: uri
          title: Storage Url
          description: External URL where the file is hosted
        enabled:
          type: boolean
          title: Enabled
          description: Whether the file is active
          default: true
        position:
          type: integer
