description: >-
  Toolhouse is a Backend-as-a-Service platform for building, deploying, and
  managing AI agents. Developers define agents as code and deploy them as APIs
  with a single command. Agents are automatically connected to over 40 pre-built
  tools including RAG, memory, code execution, browser automation, web scraping,
  and database connections. The platform provides SDKs for Python and TypeScript,
  integrations with Vercel AI SDK, LlamaIndex, MCP servers, n8n, Zapier, and
  Make.com, and supports major LLM providers including OpenAI, Anthropic, and
  Groq. Trusted by Cloudflare, NVIDIA, Groq, and Snowflake.
